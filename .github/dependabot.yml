version: 2
updates:
# GitHub Actions dependencies (actions/checkout, actions/cache, etc.)
- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
   interval: "weekly"
   day: "monday"
  open-pull-requests-limit: 5
  labels:
  - "dependencies"
  - "ci"

- package-ecosystem: maven
  directory: "/"
  schedule:
    interval: daily
    time: "04:00"
  open-pull-requests-limit: 10
  ignore:
  - dependency-name: org.hibernate:hibernate-core
    versions:
    - 5.4.27.Final
    - 5.4.28.Final
    - 5.4.29.Final
  - dependency-name: org.testcontainers:postgresql
    versions:
    - 1.15.1
  - dependency-name: org.hsqldb:hsqldb
    versions:
    - 2.5.1
